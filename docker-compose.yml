# =============================================================================
# Docker Compose -- TechDebt
# =============================================================================
# Generated by /make-it scaffold (fastapi-nextjs)
#
# Usage:
#   docker compose --profile dev up --build
#
# Placeholders (replaced during /make-it build phase):
#   TechDebt          - human-readable app name
#   techdebt          - kebab-case app name (e.g., deliver-it)
#   3100     - host port for frontend (e.g., 3100)
#   8100      - host port for backend (e.g., 8100)
#   5500           - host port for PostgreSQL (e.g., 5500)
#   10090    - host port for mock-oidc (e.g., 10190)
#   [ADDITIONAL_SERVICE_URLS]    - extra env vars for integrations
#   [ADDITIONAL_MOCK_SERVICES]   - extra mock service definitions
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Frontend (Next.js)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Backend (FastAPI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
      mock-oidc:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://techdebt:techdebt@db:5432/techdebt
      - OIDC_ISSUER_URL=http://mock-oidc:10090
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3100
      - BACKEND_URL=http://localhost:8100
      - ENFORCE_SECRETS=false
      - LOG_BUFFER_SIZE=10000
      - WORKDAY_BASE_URL=http://mock-workday:9001
      - AUDITBOARD_BASE_URL=http://mock-auditboard:9002
      - ENTRA_ID_BASE_URL=http://mock-entra:9003
      - TAILSPEND_BASE_URL=http://mock-tailspend:9004
      - GRAPH_BASE_URL=http://mock-graph:9005
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Database (PostgreSQL)
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "5500:5432"
    environment:
      - POSTGRES_USER=techdebt
      - POSTGRES_PASSWORD=techdebt
      - POSTGRES_DB=techdebt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techdebt"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock OIDC Provider (local dev only)
  # --------------------------------------------------------------------------
  # Port mapping: The container always listens on 10090 internally.
  # 10090 is the HOST port (may differ from 10090 to avoid conflicts).
  #
  # Two base URLs handle the Docker networking split:
  #   EXTERNAL (http://localhost:10090) -- browser navigates here
  #   INTERNAL (http://mock-oidc:10090) -- backend calls this inside Docker network
  #
  # The backend's OIDC_ISSUER_URL uses the INTERNAL address (http://mock-oidc:10090)
  # so token/userinfo calls stay within the Docker network.
  # --------------------------------------------------------------------------
  mock-oidc:
    build:
      context: ./mock-services/mock-oidc
      dockerfile: Dockerfile
    ports:
      - "10090:10090"
    profiles:
      - dev
    environment:
      - MOCK_OIDC_PORT=10090
      - MOCK_OIDC_EXTERNAL_BASE_URL=http://localhost:10090
      - MOCK_OIDC_INTERNAL_BASE_URL=http://mock-oidc:10090
      - MOCK_OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - MOCK_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock Workday (procurement/sourcing data)
  # --------------------------------------------------------------------------
  mock-workday:
    build:
      context: ./mock-services/mock-workday
      dockerfile: Dockerfile
    ports:
      - "${WORKDAY_PORT:-9101}:9001"
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock AuditBoard (vendor risk/compliance data)
  # --------------------------------------------------------------------------
  mock-auditboard:
    build:
      context: ./mock-services/mock-auditboard
      dockerfile: Dockerfile
    ports:
      - "${AUDITBOARD_PORT:-9002}:9002"
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock Entra ID (login/usage analytics)
  # --------------------------------------------------------------------------
  mock-entra:
    build:
      context: ./mock-services/mock-entra
      dockerfile: Dockerfile
    ports:
      - "${ENTRA_PORT:-9003}:9003"
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock Tailspend (vendor spend analytics)
  # --------------------------------------------------------------------------
  mock-tailspend:
    build:
      context: ./mock-services/mock-tailspend
      dockerfile: Dockerfile
    ports:
      - "${TAILSPEND_PORT:-9004}:9004"
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock Microsoft Graph API (app discovery, sign-ins, licenses)
  # --------------------------------------------------------------------------
  mock-graph:
    build:
      context: ./mock-services/mock-graph
      dockerfile: Dockerfile
    ports:
      - "${GRAPH_PORT:-9005}:9005"
    profiles:
      - dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
